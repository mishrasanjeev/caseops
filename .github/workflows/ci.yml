name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-flight runs for the same branch so a fast follow-up push
  # doesn't queue behind an already-obsolete build.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check src tests

      - name: Pytest with coverage (P1-001 per-area gates)
        working-directory: apps/api
        run: uv run pytest -q --cov=caseops_api --cov-report=json:coverage.json --cov-report=term

      - name: Coverage gate (per-area thresholds)
        working-directory: apps/api
        # scripts/coverage_gate.py reads coverage.json + asserts each
        # tracked module is at or above its 2026-04-24 baseline.
        # Update baselines in scripts/coverage_gate.py only when the
        # module gains real test coverage; never ratchet down to make
        # CI green.
        run: uv run python ../../scripts/coverage_gate.py coverage.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage.json
          retention-days: 14

  postgres-validation:
    # AQ-005 (2026-04-25): pgvector-backed validation suite. The bulk
    # of the API suite uses SQLite (fast, hermetic) but a small subset
    # of behavior depends on real Postgres semantics: pgvector + HNSW,
    # FK ON DELETE SET NULL, JSONB roundtrip, server_default=false,
    # and migrations under batch_alter_table on a real PG dialect.
    # See apps/api/tests/test_postgres_validation.py for what's covered.
    name: Postgres + pgvector validation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        # pgvector-on-pg17 image — same backend version as prod Cloud SQL.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: caseops
          POSTGRES_PASSWORD: caseops_test
          POSTGRES_DB: caseops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caseops -d caseops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Enable pgvector extension on the test DB
        env:
          PGPASSWORD: caseops_test
        run: |
          # The pgvector image preinstalls the extension binary but each
          # database has to opt-in with CREATE EXTENSION. Idempotent.
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          psql -h 127.0.0.1 -U caseops -d caseops_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Pytest -m postgres
        working-directory: apps/api
        env:
          # conftest.py reads this. _ensure_migrations runs alembic
          # upgrade head against this URL on first test collection.
          CASEOPS_TEST_POSTGRES_URL: postgresql+psycopg://caseops:caseops_test@127.0.0.1:5432/caseops_test
          CASEOPS_ENV: ci
          CASEOPS_AUTH_SECRET: pg-validation-secret-at-least-32-bytes
        run: uv run pytest -q -m postgres tests/test_postgres_validation.py

  web:
    name: Web (typecheck + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Web typecheck
        run: npm run typecheck:web

      - name: Vitest with coverage (AQ-002 reliability + threshold ratchet)
        # AQ-002 (2026-04-25): replaced the bare `test:web` step with
        # the coverage variant. testTimeout=15_000 + thresholds wired
        # in apps/web/vitest.config.ts make this stable on Linux
        # runners. Failing this step is the gate — do not weaken
        # thresholds to make CI green; raise them only when real tests
        # cover more lines.
        run: npm run test:coverage --workspace @caseops/web

      - name: Upload web coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: |
            apps/web/coverage/coverage-summary.json
            apps/web/coverage/lcov.info
          retention-days: 14
          if-no-files-found: warn

      - name: Next build
        run: npm run build:web

  e2e:
    name: Playwright app suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.13

      - run: npm ci

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Next build (reused by `next start` in playwright webServer)
        # NEXT_PUBLIC_* are baked at build time. Playwright opens pages on
        # http://127.0.0.1:3100 and the e2e API runs on http://127.0.0.1:8000.
        # Without this env, Next defaults the client bundle to
        # http://localhost:8000 — which means Set-Cookie scopes to host
        # `localhost` and JS on host `127.0.0.1` cannot read the
        # caseops_csrf cookie, so every mutating request fails CSRF.
        # Locally the same bug is masked by apps/web/.env.local.
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build:web

      - name: Playwright (app config)
        # playwright.app.config.ts probes for Windows Edge/Chrome paths on
        # the developer's workstation. On the Ubuntu runner those paths
        # don't exist, so `launchOptions` stays empty and Playwright uses
        # its bundled Chromium. No extra env needed.
        run: npm run test:e2e:app

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Staging deploy skeleton (Sprint 14 / BG-044).
  #
  # Guarded on the GCP_WORKLOAD_IDENTITY_PROVIDER secret so forks and
  # contributors without GCP credentials never trigger a deploy. Runs
  # on `main` only, after api + web + e2e all pass. Builds a container
  # image, pushes to Artifact Registry, runs Alembic against the
  # staging Cloud SQL instance, then deploys to Cloud Run with
  # observability on.
  #
  # When GCP credentials land, the secrets required are:
  #   GCP_PROJECT_ID
  #   GCP_REGION
  #   GCP_WORKLOAD_IDENTITY_PROVIDER
  #   GCP_DEPLOY_SA (service account email with run.admin + artifactregistry.writer + cloudsql.client)
  #   CASEOPS_DATABASE_URL (staging)
  #   CASEOPS_AUTH_SECRET (staging, ≥ 32 bytes)
  # until then the job is a visible no-op so the workflow shape is
  # reviewable in PRs.
  deploy-staging:
    name: Cloud Run deploy (staging)
    runs-on: ubuntu-latest
    needs: [api, web, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 25
    steps:
      - name: Gate on GCP credentials
        id: credgate
        run: |
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "GCP_WORKLOAD_IDENTITY_PROVIDER not set — deploy is a visible no-op."
            echo "deploy=skip" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=run" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.credgate.outputs.deploy == 'run'
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        if: steps.credgate.outputs.deploy == 'run'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        if: steps.credgate.outputs.deploy == 'run'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        if: steps.credgate.outputs.deploy == 'run'
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build + push container image
        if: steps.credgate.outputs.deploy == 'run'
        working-directory: apps/api
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/caseops/caseops-api:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Run Alembic migrations against staging
        if: steps.credgate.outputs.deploy == 'run'
        env:
          CASEOPS_DATABASE_URL: ${{ secrets.CASEOPS_DATABASE_URL_STAGING }}
        working-directory: apps/api
        run: |
          pipx install uv
          uv sync
          uv run alembic upgrade head

      - name: Deploy to Cloud Run (staging)
        if: steps.credgate.outputs.deploy == 'run'
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/caseops/caseops-api:${{ github.sha }}
        run: |
          gcloud run deploy caseops-api-staging \
            --image "$IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --service-account "${{ secrets.GCP_DEPLOY_SA }}" \
            --set-env-vars CASEOPS_ENV=staging,CASEOPS_OTEL_ENABLED=true,CASEOPS_LOG_FORMAT=json \
            --set-secrets CASEOPS_AUTH_SECRET=caseops-auth-secret:latest,CASEOPS_LLM_API_KEY=caseops-llm-api-key:latest \
            --no-allow-unauthenticated
