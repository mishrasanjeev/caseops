name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-flight runs for the same branch so a fast follow-up push
  # doesn't queue behind an already-obsolete build.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check src tests

      - name: Pytest
        working-directory: apps/api
        run: uv run pytest -q

  web:
    name: Web (typecheck + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Web typecheck
        run: npm run typecheck:web

      - name: Vitest (component tests)
        run: npm run test:web

      - name: Next build
        run: npm run build:web

  e2e:
    name: Playwright app suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.13

      - run: npm ci

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Next build (reused by `next start` in playwright webServer)
        run: npm run build:web

      - name: Playwright (app config)
        # playwright.app.config.ts probes for Windows Edge/Chrome paths on
        # the developer's workstation. On the Ubuntu runner those paths
        # don't exist, so `launchOptions` stays empty and Playwright uses
        # its bundled Chromium. No extra env needed.
        run: npm run test:e2e:app

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
